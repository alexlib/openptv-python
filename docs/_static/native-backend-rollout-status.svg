<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="640" viewBox="0 0 1180 640" role="img" aria-labelledby="title desc">
  <title id="title">Rollout status for unified backend dispatch</title>
  <desc id="desc">Figure showing which 3D-PTV pipeline stages already auto-delegate to optv and which only have native parity paths today.</desc>
  <rect width="1180" height="640" fill="#f6f2e8"/>
  <rect x="34" y="28" width="1112" height="584" rx="24" fill="#fffdf8" stroke="#d7cfbf" stroke-width="2"/>

  <text x="64" y="74" font-family="Helvetica, Arial, sans-serif" font-size="30" font-weight="700" fill="#1f2933">Backend rollout status by pipeline stage</text>
  <text x="64" y="104" font-family="Helvetica, Arial, sans-serif" font-size="17" fill="#4b5563">The public Python API covers the full workflow today. The distinction is whether native dispatch is already transparent in normal runtime calls.</text>

  <rect x="66" y="148" width="500" height="392" rx="18" fill="#e4f3e6" stroke="#7cab82" stroke-width="2"/>
  <text x="92" y="186" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#214d27">Auto-delegated today</text>
  <text x="92" y="214" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#355e3a">These public calls already route to optv automatically when bindings are available.</text>

  <rect x="92" y="246" width="448" height="92" rx="14" fill="#ffffff" stroke="#a7c8ab" stroke-width="1.5"/>
  <text x="116" y="278" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#214d27">Image preprocessing</text>
  <text x="116" y="304" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#3b5d40">openptv_python.image_processing.preprocess_image()</text>
  <text x="116" y="326" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5b6b5e">Same signature, internal dispatch through _native_compat and _native_convert.</text>

  <rect x="92" y="362" width="448" height="104" rx="14" fill="#ffffff" stroke="#a7c8ab" stroke-width="1.5"/>
  <text x="116" y="394" font-family="Helvetica, Arial, sans-serif" font-size="20" font-weight="700" fill="#214d27">Full-frame target recognition</text>
  <text x="116" y="420" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#3b5d40">openptv_python.segmentation.targ_rec()</text>
  <text x="116" y="442" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#5b6b5e">Whole-image path delegates transparently; results are converted back to Python Target objects.</text>

  <rect x="614" y="148" width="500" height="392" rx="18" fill="#f7eadf" stroke="#c78f62" stroke-width="2"/>
  <text x="640" y="186" font-family="Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#6f3b1b">Parity-tested, not yet transparent</text>
  <text x="640" y="214" font-family="Helvetica, Arial, sans-serif" font-size="16" fill="#7a4a2f">These stages have native comparison or adapter paths, but routine openptv_python dispatch still uses the Python implementation by default.</text>

  <rect x="640" y="246" width="448" height="70" rx="14" fill="#ffffff" stroke="#d3ab88" stroke-width="1.5"/>
  <text x="664" y="276" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#6f3b1b">Point reconstruction</text>
  <text x="664" y="300" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#825539">point_positions() and multi_cam_point_positions() have native parity in the stress suite.</text>

  <rect x="640" y="330" width="448" height="70" rx="14" fill="#ffffff" stroke="#d3ab88" stroke-width="1.5"/>
  <text x="664" y="360" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#6f3b1b">Correspondences / stereo matching</text>
  <text x="664" y="384" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#825539">py_correspondences() is benchmarked against optv correspondences, but not auto-routed yet.</text>

  <rect x="640" y="414" width="448" height="70" rx="14" fill="#ffffff" stroke="#d3ab88" stroke-width="1.5"/>
  <text x="664" y="444" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#6f3b1b">Tracking workflow</text>
  <text x="664" y="468" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#825539">Python TrackingRun is compared with native optv Tracker in the stress suite, but dispatch is still separate.</text>

  <rect x="640" y="498" width="448" height="70" rx="14" fill="#ffffff" stroke="#d3ab88" stroke-width="1.5"/>
  <text x="664" y="528" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#6f3b1b">Sequence parameter I/O</text>
  <text x="664" y="552" font-family="Helvetica, Arial, sans-serif" font-size="15" fill="#825539">Native bindings exist and are benchmarked, but Python remains the normal entry point.</text>
</svg>